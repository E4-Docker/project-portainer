services:
  portainer-ce:
    image: portainer/portainer-ce:latest
    ports:
      - '9000:9000' # HTTP
      - '9443:9443' # HTTPS
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - 'data:/data'
    deploy:
      placement:
        constraints: 
          - node.role == manager
          - node.platform.os == linux

volumes:
  data: